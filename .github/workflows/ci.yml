name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── PHP: syntax check + WordPress coding standards ─────────────────────────
  php:
    name: PHP Lint & Code Standards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2, cs2pr
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHP syntax check
        run: find . -name "*.php" -not -path "./vendor/*" | xargs php -l

      - name: Run PHPCS
        run: vendor/bin/phpcs --report=checkstyle | cs2pr

  # ── JavaScript: lint + build ────────────────────────────────────────────────
  js:
    name: JS Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Lint CSS
        run: npm run lint:css

      - name: Build block assets
        run: npm run build

      - name: Verify build output exists
        run: |
          test -f build/index.js       || (echo "❌ build/index.js missing"       && exit 1)
          test -f build/index.asset.php || (echo "❌ build/index.asset.php missing" && exit 1)
          test -f build/style-index.css || (echo "❌ build/style-index.css missing" && exit 1)
          echo "✓ All expected build artifacts present"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: block-build
          path: build/
          retention-days: 7

  # ── Release: build plugin zip ───────────────────────────────────────────────
  # Runs only on version tags (e.g. v1.0.0) — creates a GitHub Release
  # with an installable plugin zip ready to upload to WordPress.
  release:
    name: Build Release Zip
    runs-on: ubuntu-latest
    needs: [php, js]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Build block assets
        run: npm ci && npm run build

      - name: Package plugin zip
        run: |
          mkdir -p dist/partner-directory

          # Copy plugin files — exclude dev-only files
          rsync -av --exclude='dist' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.ddev' \
            --exclude='docker-compose.yml' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='vendor' \
            --exclude='phpcs.xml.dist' \
            --exclude='blocks' \
            --exclude='.gitignore' \
            . dist/partner-directory/

          cd dist
          zip -r partner-directory.zip partner-directory/
          echo "Plugin zip built: dist/partner-directory.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/partner-directory.zip
          generate_release_notes: true
